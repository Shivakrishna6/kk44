name: Add Metadata to TFLite Model

on:
  workflow_dispatch

jobs:
  add-metadata:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install tensorflow tflite-support
    
    - name: Add metadata
      run: |
        python << 'EOF'
        from tflite_support import metadata_writer
        import os
        
        writer = metadata_writer.MetadataWriter('model_fine_tuned.tflite')
        with open('labels_fine_tuned.txt') as f:
            labels = [line.strip() for line in f]
        writer.add_general_info("Image Classifier", "Fine-tuned model")
        writer.add_image_input((127.5,), (127.5,))
        writer.add_classification_output(labels)
        writer.populate()
        writer.write('model_with_metadata.tflite')
        print("✅ Done!")
        EOF
    
    - name: Commit model
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add model_with_metadata.tflite
        git commit -m "Add metadata to model"
        git push
